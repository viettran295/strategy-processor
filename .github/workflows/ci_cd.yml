name: ci_cd

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/strategy-processor:arm64

  build-amd64:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/strategy-processor:x86_64

  deploy:
    runs-on: ubuntu-24.04
    needs: [build-arm64]
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_KEY }}
        port: 22
        script: |
          VPS_ARCH=$(uname -m)
          CONTAINER_NAME="strategy-processor"
          ARM64_IMG="${{ secrets.DOCKER_USERNAME }}/strategy-processor:arm64"
          NETWORK="vtrade-network"
          docker network inspect $NETWORK >/dev/null 2>&1 || \
              docker network create $NETWORK
          if [ "$VPS_ARCH" == "aarch64" ]; then
            docker pull $ARM64_IMG
            docker stop $CONTAINER_NAME
            docker rm $CONTAINER_NAME
            docker run -d \
                    --name $CONTAINER_NAME \
                    -p 8000:8000 \
                    -e TWEL_DATA_KEY=${{ secrets.TWEL_DATA_KEY }} \
                    --network $NETWORK \
                    $ARM64_IMG
          else
            echo "Unsupported architecture: $VPS_ARCH"
            exit 1
          fi


